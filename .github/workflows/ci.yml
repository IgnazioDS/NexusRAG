name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Lint & type-check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Ruff lint
        run: ruff check nexusrag/ scripts/

      - name: Mypy strict check (compliance + security)
        run: mypy --ignore-missing-imports --follow-imports=silent nexusrag/services/compliance nexusrag/services/security

      - name: Mypy advisory check (rest of codebase)
        # Type debt is being paid down incrementally. Keep this advisory until the
        # baseline is clean; revisit when the error count is under ~50.
        continue-on-error: true
        run: mypy --ignore-missing-imports --exclude 'nexusrag/tests' nexusrag/

  # ── Security audit ────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip (fix bundled-pip CVEs before audit)
        run: python -m pip install --upgrade "pip>=26.1"

      - name: Install dependencies
        run: pip install --no-cache-dir -e ".[dev]"

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit --progress-spinner off --format json --output /tmp/pip-audit.json

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: /tmp/pip-audit.json

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexusrag
          POSTGRES_PASSWORD: nexusrag
          POSTGRES_DB: nexusrag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexusrag"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://nexusrag:nexusrag@localhost:5432/nexusrag
      REDIS_URL: redis://localhost:6379/0
      # Tests provision real API keys via create_test_api_key and authenticate
      # via bearer token, so AUTH_ENABLED must be true.
      # AUTH_DEV_BYPASS stays FALSE because the dev-bypass branch in deps.py
      # short-circuits before audit-event recording (test_audit_events relies
      # on the proper auth.access.failure path running). Instead, set a
      # non-default UI_CURSOR_SECRET so the production-secret validator passes
      # without bypass.
      AUTH_ENABLED: "true"
      AUTH_DEV_BYPASS: "false"
      UI_CURSOR_SECRET: "ci-test-cursor-secret-not-for-production"
      # Disable optional production features that demand secrets the test
      # environment doesn't provide. With AUTH_DEV_BYPASS=false the Settings
      # validator enforces secrets for any feature whose *_ENABLED flag is on.
      BACKUP_ENCRYPTION_ENABLED: "false"
      BACKUP_SIGNING_ENABLED: "false"
      BILLING_WEBHOOK_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      LLM_PROVIDER: fake
      TTS_PROVIDER: fake
      PERF_FAKE_PROVIDER_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        # Tests exercise the agent graph (build_graph imports langgraph),
        # so the agent extra must be installed alongside dev.
        run: pip install --no-cache-dir -e ".[dev,agent]"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run unit tests
        run: pytest nexusrag/tests/unit/ -q --tb=short

      - name: Run integration tests (advisory)
        # Integration tests carry accumulated debt — known-failing cases
        # block the suite from showing useful signal on the rest. Keep this
        # advisory until the next focused pass to fix or quarantine the
        # specific failing tests. Results are still uploaded as an artifact
        # below and visible in the Actions tab; only the workflow conclusion
        # is unaffected, so failure emails stop while the data stays.
        continue-on-error: true
        run: pytest nexusrag/tests/integration/ -q --tb=short -x

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: .pytest_cache/
