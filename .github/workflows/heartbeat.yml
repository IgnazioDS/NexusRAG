name: Heartbeat

# Keep the eleventh.dev telemetry widget green by writing one query_log row
# every ~10 minutes. The endpoint is auth-gated by HEARTBEAT_SECRET so this
# workflow is the only thing that can flip last_active_at outside of real
# user traffic.
#
# Activation: add a repo secret named HEARTBEAT_SECRET AND set the same
# value as a Vercel env var on the nexusrag project. Until both are set
# the workflow runs but skips the ping (warning annotation, green run).
#
# To deactivate after enabling: remove the GitHub secret. The endpoint
# stays online for direct callers, the workflow stops pinging.

on:
  schedule:
    # Every 10 minutes. Cron granularity on GitHub is best-effort — actual
    # firings can drift by 1-3 min during peak Actions load. 10-min cadence
    # gives plenty of margin under any reasonable widget staleness threshold.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}  # Allow manual fire from the Actions tab.

permissions:
  contents: read

concurrency:
  # Skip overlapping runs if a previous heartbeat is still in flight.
  group: heartbeat
  cancel-in-progress: false

jobs:
  ping:
    name: Ping nexusrag /api/heartbeat
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: POST heartbeat
        env:
          HEARTBEAT_URL: https://nexusrag.eleventh.dev/api/heartbeat
          HEARTBEAT_SECRET: ${{ secrets.HEARTBEAT_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "$HEARTBEAT_SECRET" ]; then
            # Opt-in feature, not yet configured. Skip with a visible warning
            # annotation so the workflow run is green (no failure emails) but
            # the state is obvious to anyone who opens the run.
            echo "::warning::HEARTBEAT_SECRET not configured — skipping heartbeat. See workflow file header for setup."
            exit 0
          fi
          # Use --fail-with-body so we get the response payload on non-2xx.
          # --max-time covers the curl total budget; the endpoint itself
          # should respond in <1s.
          curl --fail-with-body \
               --silent \
               --show-error \
               --max-time 30 \
               --retry 2 \
               --retry-delay 5 \
               --header "Authorization: Bearer $HEARTBEAT_SECRET" \
               --request POST \
               "$HEARTBEAT_URL"
